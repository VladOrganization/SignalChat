<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌈 Rainbow Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
<div class="rainbow-bar"></div>

<div class="container">
    <h1 class="title">SignalChat</h1>

    <div class="input-area">
        <input type="text" id="message" placeholder="Введите сообщение..." />
        <div class="btn-row">
            <input type="button" id="sendBtn" value="✉️ Отправить" disabled="disabled" />
            <input type="button" id="clearBtn" value="🗑️ Очистить"/>
        </div>
    </div>

    <div id="chatroom"></div>
</div>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

    :root {
        --red:    #FF4B4B;
        --orange: #FF8C00;
        --yellow: #FFD700;
        --green:  #2ECC71;
        --blue:   #3A86FF;
        --violet: #9B5DE5;
        --pink:   #FF69B4;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: 'Nunito', sans-serif;
        background: #0e0e14;
        min-height: 100vh;
        padding-bottom: 40px;
    }

    /* Animated rainbow top bar */
    .rainbow-bar {
        height: 6px;
        background: linear-gradient(90deg,
        var(--red), var(--orange), var(--yellow),
        var(--green), var(--blue), var(--violet), var(--pink));
        background-size: 200% 100%;
        animation: slide 3s linear infinite;
    }

    @keyframes slide {
        0%   { background-position: 0% 0; }
        100% { background-position: 200% 0; }
    }

    .container {
        max-width: 700px;
        margin: 40px auto;
        padding: 0 20px;
    }

    .title {
        font-size: 2.4rem;
        font-weight: 900;
        text-align: center;
        margin-bottom: 30px;
        background: linear-gradient(90deg,
        var(--red), var(--orange), var(--yellow),
        var(--green), var(--blue), var(--violet));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -0.5px;
        animation: shimmer 4s ease-in-out infinite;
        background-size: 200% auto;
    }

    @keyframes shimmer {
        0%   { background-position: 0% center; }
        50%  { background-position: 100% center; }
        100% { background-position: 0% center; }
    }

    /* Input area */
    .input-area {
        background: rgba(255,255,255,0.04);
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 24px;
        position: relative;
        /* Rainbow border via outline trick — no pseudo-element overlap */
        border: 1.5px solid transparent;
        background-clip: padding-box;
        box-shadow: 0 0 0 1.5px rgba(155,93,229,0.5),
        0 0 0 1.5px rgba(58,134,255,0.3);
        /* Layered gradient border using outline + bg */
    }

    /* Rainbow animated border using a wrapper approach — pointer-events: none so it never blocks */
    .input-area::before {
        content: '';
        position: absolute;
        inset: -2px;
        border-radius: 18px;
        background: linear-gradient(135deg, var(--violet), var(--blue), var(--green), var(--yellow), var(--orange), var(--red));
        background-size: 300% 300%;
        animation: borderMove 4s ease infinite;
        z-index: 0;
        pointer-events: none;
    }

    .input-area::after {
        content: '';
        position: absolute;
        inset: 1.5px;
        border-radius: 15px;
        background: #131320;
        z-index: 1;
        pointer-events: none;
    }

    @keyframes borderMove {
        0%   { background-position: 0% 50%; }
        50%  { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    /* All direct children of input-area sit above the pseudo border */
    .input-area > * {
        position: relative;
        z-index: 2;
    }

    #message {
        width: 100%;
        background: rgba(255,255,255,0.07);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 10px;
        padding: 12px 16px;
        font-family: 'Nunito', sans-serif;
        font-size: 1rem;
        color: #fff;
        outline: none;
        transition: border-color 0.3s, box-shadow 0.3s;
        margin-bottom: 14px;
    }

    #message::placeholder { color: rgba(255,255,255,0.3); }

    #message:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 3px rgba(58,134,255,0.2);
    }

    .btn-row {
        display: flex;
        gap: 10px;
    }

    input[type="button"] {
        font-family: 'Nunito', sans-serif;
        font-size: 0.95rem;
        font-weight: 700;
        border: none;
        border-radius: 10px;
        padding: 10px 20px;
        cursor: pointer;
        transition: transform 0.15s, box-shadow 0.15s, opacity 0.3s;
    }

    #sendBtn {
        background: linear-gradient(135deg, var(--blue), var(--violet));
        color: #fff;
        flex: 1;
        box-shadow: 0 4px 18px rgba(58,134,255,0.35);
    }

    #sendBtn:not([disabled]):hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 24px rgba(58,134,255,0.5);
    }

    #sendBtn[disabled] {
        opacity: 0.4;
        cursor: not-allowed;
    }

    #clearBtn {
        background: rgba(255,255,255,0.07);
        color: rgba(255,255,255,0.7);
        border: 1px solid rgba(255,255,255,0.15);
    }

    #clearBtn:hover {
        background: rgba(255,75,75,0.2);
        color: var(--red);
        border-color: var(--red);
        transform: translateY(-2px);
    }

    /* Chatroom */
    #chatroom {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    /* Each message */
    #chatroom p {
        background: rgba(255,255,255,0.04);
        border-left: 3px solid transparent;
        border-radius: 10px;
        padding: 12px 16px;
        color: rgba(255,255,255,0.85);
        font-size: 0.97rem;
        line-height: 1.5;
        animation: fadeIn 0.3s ease;
        border-image: linear-gradient(180deg, var(--violet), var(--blue)) 1;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    /* Each message — cycle rainbow border */
    #chatroom p:nth-child(7n+1) { border-left-color: var(--red); }
    #chatroom p:nth-child(7n+2) { border-left-color: var(--orange); }
    #chatroom p:nth-child(7n+3) { border-left-color: var(--yellow); }
    #chatroom p:nth-child(7n+4) { border-left-color: var(--green); }
    #chatroom p:nth-child(7n+5) { border-left-color: var(--blue); }
    #chatroom p:nth-child(7n+6) { border-left-color: var(--violet); }
    #chatroom p:nth-child(7n+7) { border-left-color: var(--pink); }

    /* Username bold span */
    #chatroom b {
        background: linear-gradient(90deg, var(--pink), var(--violet));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        font-weight: 900;
    }

    /* Notify messages */
    #chatroom p:has(> b:only-child) {
        background: rgba(255,255,255,0.02);
        border-left-color: var(--yellow) !important;
        font-style: italic;
        color: rgba(255,255,255,0.5);
        font-size: 0.88rem;
    }
    #chatroom p:has(> b:only-child) b {
        background: linear-gradient(90deg, var(--yellow), var(--orange));
        -webkit-background-clip: text;
        background-clip: text;
    }

    /* Floating pride hearts */
    body::after {
        content: '🏳️‍🌈';
        position: fixed;
        bottom: 20px;
        right: 24px;
        font-size: 1.8rem;
        opacity: 0.25;
        pointer-events: none;
    }

    /* ===== RESPONSIVE / MOBILE ===== */
    @media (max-width: 600px) {
        .container {
            margin: 16px auto;
            padding: 0 12px;
        }

        .title {
            font-size: 1.7rem;
            margin-bottom: 20px;
        }

        .input-area {
            padding: 14px;
            margin-bottom: 16px;
        }

        #message {
            font-size: 0.97rem;
            padding: 11px 13px;
            margin-bottom: 10px;
        }

        .btn-row {
            flex-direction: column;
            gap: 8px;
        }

        input[type="button"] {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
        }

        #sendBtn {
            flex: unset;
        }

        #chatroom p {
            font-size: 0.93rem;
            padding: 10px 13px;
        }

        body::after {
            font-size: 1.3rem;
            bottom: 12px;
            right: 14px;
        }
    }

    @media (max-width: 380px) {
        .title {
            font-size: 1.4rem;
        }

        .input-area {
            padding: 12px;
        }
    }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/6.0.1/signalr.js"></script>
<script>
    const hubConnection = new signalR.HubConnectionBuilder()
        .withUrl("/chat")
        .build();

    document.getElementById("sendBtn").addEventListener("click", function () {
        const message = document.getElementById("message").value;
        hubConnection.invoke("Send", message)
            .catch(function (err) {
                return console.error(err.toString());
            });
    });

    hubConnection.on("Receive", function (message) {
        const userNameElem = document.createElement("b");
        userNameElem.textContent = `${message.userName}: `;

        const elem = document.createElement("p");
        elem.appendChild(userNameElem);
        elem.appendChild(document.createTextNode(message.message));

        const firstElem = document.getElementById("chatroom").firstChild;
        document.getElementById("chatroom").insertBefore(elem, firstElem);
    });

    document.getElementById("clearBtn").addEventListener("click", function () {
        hubConnection.invoke("Clear");
        location.reload();
    });

    hubConnection.on("OnInit", function (messages) {
        for (const message of messages) {
            const userNameElem = document.createElement("b");
            userNameElem.textContent = `${message.userName}: `;

            const elem = document.createElement("p");
            elem.appendChild(userNameElem);
            elem.appendChild(document.createTextNode(message.message));

            const firstElem = document.getElementById("chatroom").firstChild;
            document.getElementById("chatroom").insertBefore(elem, firstElem);
        }
    });

    hubConnection.on("Notify", function (message) {
        const notifyElem = document.createElement("b");
        notifyElem.textContent = message;
        const elem = document.createElement("p");
        elem.appendChild(notifyElem);
        const firstElem = document.getElementById("chatroom").firstChild;
        document.getElementById("chatroom").insertBefore(elem, firstElem);
    });

    hubConnection.start()
        .then(function () {
            document.getElementById("sendBtn").disabled = false;
            hubConnection.invoke("Init");
        })
        .catch(function (err) {
            return console.error(err.toString());
        });
</script>
</body>
</html>
